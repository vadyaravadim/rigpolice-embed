name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      strict-readme: true

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PHP=$(sed -nE 's/.*Version:[[:space:]]*([0-9][0-9.]+).*/\1/p' rigpolice-embed.php | head -1)
          STABLE=$(sed -nE 's/.*Stable tag:[[:space:]]*([0-9][0-9.]+).*/\1/p' readme.txt | head -1)
          echo "tag=$TAG php=$PHP stable=$STABLE"
          fail=0
          for pair in "plugin header:$PHP" "readme Stable tag:$STABLE"; do
            name="${pair%%:*}"; val="${pair##*:}"
            if [ "$val" != "$TAG" ]; then
              echo "::error::$name is '$val' but the tag is '$TAG' — bump it to match before tagging."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Package plugin zip
        run: |
          mkdir -p build
          git archive --format=tar --prefix=rigpolice-embed/ HEAD | tar -xf - -C build
          (cd build && zip -qr ../rigpolice-embed.zip rigpolice-embed)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RigPolice Embed $GITHUB_REF_NAME" \
            --generate-notes \
            rigpolice-embed.zip

  wordpress-org:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve WP.org version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: rigpolice-embed
          VERSION: ${{ steps.ver.outputs.version }}
