name: Release

# Tag-driven release. Push a `v*` tag and this: (1) verifies the plugin header + readme Stable tag equal
# the tag (drift guard; block.json omits `version` and index.asset.php derives it from the header, so they
# can't drift), (2) packages the plugin zip (excluding VCS + WP.org assets), (3) publishes a GitHub
# Release with it, AND (4) deploys to the WordPress.org plugin directory over SVN (trunk + tags/<version>
# + assets from .wordpress-org). So a release is just: bump those two + changelog, commit, then
# `git tag vX.Y.Z && git push origin vX.Y.Z`. What ships is scoped by .gitattributes export-ignore
# (source only — the GitHub zip is built with `git archive`, the SVN trunk by the 10up action, both of
# which honor that one list, so the two artifacts are the identical set and can't drift).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The version lives as a literal in exactly two spots: the plugin header (the source WP reads) and
      # readme.txt's Stable tag (a WP.org cross-format mirror that can't read PHP). Both must match the tag
      # (minus the leading v); block.json omits `version` and index.asset.php derives it from the header, so
      # they can't skew. Fail loud, don't ship a mismatch.
      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PHP=$(sed -nE 's/.*Version:[[:space:]]*([0-9][0-9.]+).*/\1/p' rigpolice-embed.php | head -1)
          STABLE=$(sed -nE 's/.*Stable tag:[[:space:]]*([0-9][0-9.]+).*/\1/p' readme.txt | head -1)
          echo "tag=$TAG php=$PHP stable=$STABLE"
          fail=0
          for pair in "plugin header:$PHP" "readme Stable tag:$STABLE"; do
            name="${pair%%:*}"; val="${pair##*:}"
            if [ "$val" != "$TAG" ]; then
              echo "::error::$name is '$val' but the tag is '$TAG' — bump it to match before tagging."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      # Zip so the plugin lives at rigpolice-embed/rigpolice-embed.php inside the archive. Ship source only,
      # scoped by the SAME .gitattributes export-ignore list the SVN trunk uses — via `git archive`, so the
      # GitHub zip and the WP.org trunk are the identical set and can't drift (a plain rsync exclude would
      # only drop dotfiles, leaking export-ignored source like CLAUDE.md/README.md into the zip).
      - name: Package plugin zip
        run: |
          mkdir -p build
          git archive --format=tar --prefix=rigpolice-embed/ HEAD | tar -xf - -C build
          (cd build && zip -qr ../rigpolice-embed.zip rigpolice-embed)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RigPolice Embed $GITHUB_REF_NAME" \
            --generate-notes \
            rigpolice-embed.zip

  # Publish the same commit to the WordPress.org plugin directory over SVN. Runs in parallel with the
  # GitHub Release job (independent sinks; no ordering needed). The 10up action checks out SVN, syncs
  # trunk to this commit (scoped by .gitattributes export-ignore), copies .wordpress-org/* into the SVN
  # assets/ dir, then commits trunk + a tags/<VERSION> snapshot. VERSION is set explicitly to the tag
  # minus the leading `v`: our git tags are `v1.4.1` but WP.org's tags/ dir and readme Stable tag are
  # bare `1.4.1`, and they must match. Requires two repo secrets: SVN_USERNAME + SVN_PASSWORD (the
  # WordPress.org SVN password, NOT the account password).
  wordpress-org:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # WP.org's tags/ dir and the readme Stable tag are bare (1.4.1); our git tag carries a leading `v`
      # (v1.4.1). Strip it here — GitHub Actions expressions can't do substring, so compute in shell.
      - name: Resolve WP.org version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: rigpolice-embed
          VERSION: ${{ steps.ver.outputs.version }}
