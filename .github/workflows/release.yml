name: Release

# Tag-driven release. Push a `v*` tag and this: (1) verifies the plugin header + readme Stable tag equal
# the tag (drift guard; block.json omits `version` and index.asset.php derives it from the header, so they
# can't drift), (2) packages the plugin zip (excluding VCS + WP.org assets), (3) publishes a GitHub
# Release with it. So a release is just: bump those two + changelog, commit, then
# `git tag vX.Y.Z && git push origin vX.Y.Z`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The version lives as a literal in exactly two spots: the plugin header (the source WP reads) and
      # readme.txt's Stable tag (a WP.org cross-format mirror that can't read PHP). Both must match the tag
      # (minus the leading v); block.json omits `version` and index.asset.php derives it from the header, so
      # they can't skew. Fail loud, don't ship a mismatch.
      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PHP=$(sed -nE 's/.*Version:[[:space:]]*([0-9][0-9.]+).*/\1/p' rigpolice-embed.php | head -1)
          STABLE=$(sed -nE 's/.*Stable tag:[[:space:]]*([0-9][0-9.]+).*/\1/p' readme.txt | head -1)
          echo "tag=$TAG php=$PHP stable=$STABLE"
          fail=0
          for pair in "plugin header:$PHP" "readme Stable tag:$STABLE"; do
            name="${pair%%:*}"; val="${pair##*:}"
            if [ "$val" != "$TAG" ]; then
              echo "::error::$name is '$val' but the tag is '$TAG' — bump it to match before tagging."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      # Zip so the plugin lives at rigpolice-embed/rigpolice-embed.php inside the archive. Ship source only:
      # exclude EVERY hidden file (.git/.github/.wp-env.json/.gitignore/.wordpress-org) — Plugin Check rejects
      # hidden files, and the .wordpress-org graphics go to the WP.org SVN assets dir, not the zip — plus the
      # build/ dir itself.
      - name: Package plugin zip
        run: |
          mkdir -p build/rigpolice-embed
          rsync -a --exclude='.*' --exclude='build' ./ build/rigpolice-embed/
          (cd build && zip -qr ../rigpolice-embed.zip rigpolice-embed)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RigPolice Embed $GITHUB_REF_NAME" \
            --generate-notes \
            rigpolice-embed.zip
